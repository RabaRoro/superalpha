<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - The Geek Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="index.html" class="logo">The Geek Shop</a>
      <div class="nav-links">
        <a href="products.html">Products</a>
        <a href="status.html">Order Status</a>
        <a id="cart-link" style="cursor:pointer;">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </nav>
  </header>

  <main class="container" style="padding-top: 110px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
      <h1 class="font-headline" style="font-size: 3rem;">All Products</h1>
      <button id="filter-btn" class="kinetic-gradient" style="padding:12px 24px;">Filters</button>
    </div>

    <!-- Filter Sidebar -->
    <div id="filter-sidebar" class="filter-sidebar">
      <button id="close-filter" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:2rem; cursor:pointer;">×</button>
      
      <h2 style="margin-bottom:1.5rem; font-size:1.5rem;">Filters</h2>

      <div class="filter-content">
        <!-- Price Range -->
        <div class="filter-section">
          <h3>Price Range</h3>
          <div class="price-slider-container">
            <input type="range" id="price-min-slider" min="0" max="20000" value="0">
            <input type="range" id="price-max-slider" min="0" max="20000" value="20000">
          </div>
          <div class="price-inputs">
            <input type="number" id="price-min-input" placeholder="Min">
            <input type="number" id="price-max-input" placeholder="Max">
          </div>
        </div>

        <!-- Color Filter -->
        <div class="filter-section" id="color-filter">
          <h3>Color</h3>
          <div id="color-options"></div>
        </div>

        <!-- Specs Filter -->
        <div class="filter-section" id="specs-filter" style="display:none;">
          <h3>Specifications</h3>
          <div id="keys-options"></div>
          <div id="print-options"></div>
          <div id="layout-options"></div>
          <div id="profile-options"></div>
        </div>
      </div>

      <div class="filter-buttons-fixed">
        <div class="filter-buttons">
          <button id="apply-filter" class="kinetic-gradient">Apply Filters</button>
          <button id="clear-filter">Clear</button>
        </div>
      </div>
    </div>

    <!-- Product Grid -->
    <div id="product-list" class="product-list"></div>
  </main>

  <!-- Cart Slider -->
  <div id="cart-slider" class="cart-slider">
    <button id="close-cart" style="position:absolute;top:20px;right:20px;background:none;border:none;font-size:2rem;cursor:pointer;">×</button>
    <h2>Your Cart</h2>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-total" style="padding:1.5rem 0;border-top:2px solid var(--primary);font-size:1.25rem;font-weight:600;"></div>
    <button id="checkout-cart" class="kinetic-gradient" style="width:100%;padding:1rem;">Proceed to Checkout</button>
  </div>

  <footer style="background:#0a0a0a; padding:4rem 2rem; text-align:center; color:#777; margin-top:6rem;">
    <p>© 2026 The Geek Shop BD • Built for Enthusiasts</p>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
