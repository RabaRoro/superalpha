<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Geek Shop | Build Your End-Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="index.html" class="logo">The Geek Shop</a>
      <div class="nav-links">
        <a href="products.html">Products</a>
        <a href="status.html">Order Status</a>
        <a id="cart-link">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </nav>
  </header>

  <main class="container" style="padding-top: 100px;">
    <h1 class="font-headline" style="font-size: 4.5rem; line-height: 1.1; margin-bottom: 1rem;">
      Build Your <span style="background: linear-gradient(90deg, #ecb2ff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">End-Game</span>
    </h1>
    <p style="font-size: 1.25rem; max-width: 600px; color: var(--on-surface-variant); margin-bottom: 3rem;">
      Premium mechanical keyboards, switches, and keycaps for enthusiasts in Bangladesh.
    </p>

    <h2 class="font-headline" style="font-size: 2.25rem; margin: 4rem 0 2rem;">May Interest You</h2>
    <div id="interest-products" class="product-list"></div>

    <h2 class="font-headline" style="font-size: 2.25rem; margin: 4rem 0 2rem;">Categories</h2>
    <div id="categories" class="product-list"></div>
  </main>

  <!-- Cart Slider -->
  <div id="cart-slider" class="cart-slider">
    <button id="close-cart" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:2rem; cursor:pointer;">×</button>
    <h2 style="margin-bottom:1.5rem;">Your Cart</h2>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-total" style="padding:1.5rem 0; border-top:2px solid var(--primary); font-size:1.25rem; font-weight:600;"></div>
    <button id="checkout-cart" class="kinetic-gradient" style="width:100%; padding:1rem;">Proceed to Checkout</button>
  </div>

  <footer style="background:#0a0a0a; padding:4rem 2rem; text-align:center; color:#777; margin-top:6rem;">
    <p>© 2026 The Geek Shop BD • Built for Enthusiasts</p>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
